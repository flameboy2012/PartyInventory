# Local development services for the D&D Party Inventory app.
# Start with: docker compose up -d
services:
  db:
    image: postgres:17
    container_name: party-inventory-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: party
      POSTGRES_PASSWORD: party_dev_pw
      POSTGRES_DB: party_inventory
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U party -d party_inventory"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api/PartyInventory.Api
    container_name: party-inventory-api
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: Host=db;Port=5432;Database=party_inventory;Username=party;Password=party_dev_pw
      ApplyMigrationsAtStartup: "true"
    ports:
      - "5140:8080"
    depends_on:
      db:
        condition: service_healthy

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: party-inventory-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@party.com
      PGADMIN_DEFAULT_PASSWORD: party_dev_pw
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    volumes:
      - pgadmin:/var/lib/pgadmin
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  pgadmin:
