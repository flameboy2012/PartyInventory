# Dev overlay: runs the API and web in hot-reload mode and syncs source into the
# containers. Use with:
#
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml watch
#
# (Plain `docker compose up` still uses the production images from docker-compose.yml.)
services:
  api:
    build:
      target: dev
    develop:
      watch:
        - action: sync
          path: ./api/PartyInventory.Api
          target: /src
          ignore:
            - bin/
            - obj/
        - action: rebuild
          path: ./api/PartyInventory.Api/PartyInventory.Api.csproj

  web:
    build:
      target: dev
    develop:
      watch:
        - action: sync
          path: ./web/src
          target: /app/src
        - action: sync
          path: ./web/public
          target: /app/public
        - action: rebuild
          path: ./web/package.json
